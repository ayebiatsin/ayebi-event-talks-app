<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BigQuery Release Notes</title>
  <meta name="description" content="Browse the latest BigQuery release notes fetched directly from Google Cloud's official feed." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <!-- Background blobs -->
  <div class="bg-blob blob-1"></div>
  <div class="bg-blob blob-2"></div>
  <div class="bg-blob blob-3"></div>

  <div class="app-wrapper">
    <!-- Header -->
    <header class="header">
      <div class="header-inner">
        <div class="brand">
          <span class="brand-icon">
            <svg width="28" height="28" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect width="48" height="48" rx="12" fill="url(#bq-grad)"/>
              <path d="M14 34L24 14L34 34H14Z" fill="white" fill-opacity="0.9"/>
              <circle cx="24" cy="30" r="4" fill="#60A5FA"/>
              <defs>
                <linearGradient id="bq-grad" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
                  <stop stop-color="#1E3A8A"/>
                  <stop offset="1" stop-color="#3B82F6"/>
                </linearGradient>
              </defs>
            </svg>
          </span>
          <div>
            <h1 class="brand-title">BigQuery Release Notes</h1>
            <p class="brand-subtitle">Live feed from Google Cloud</p>
          </div>
        </div>

        <div class="header-actions">
          <span class="last-updated" id="lastUpdated">—</span>
          <button class="export-btn" id="exportBtn" onclick="exportToCsv()" aria-label="Export to CSV">
            <span class="export-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="7 10 12 15 17 10"/>
                <line x1="12" y1="15" x2="12" y2="3"/>
              </svg>
            </span>
            <span>Export CSV</span>
          </button>
          <button class="refresh-btn" id="refreshBtn" onclick="loadReleaseNotes()" aria-label="Refresh release notes">
            <span class="refresh-icon" id="refreshIcon">
              <svg id="refreshSvg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="23 4 23 10 17 10"/>
                <polyline points="1 20 1 14 7 14"/>
                <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
              </svg>
            </span>
            <span id="refreshLabel">Refresh</span>
          </button>
        </div>
      </div>
    </header>

    <!-- Stats bar -->
    <div class="stats-bar" id="statsBar" style="display:none;">
      <span class="stat-item" id="statCount">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        <span id="entryCount">0</span> entries
      </span>
      <span class="stat-divider">·</span>
      <span class="stat-item">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        Updated <span id="feedUpdated">—</span>
      </span>
      <span class="stat-divider">·</span>
      <span class="stat-item filter-group">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
        Filter:
        <span class="filter-chips" id="filterChips"></span>
      </span>
    </div>

    <!-- Main content -->
    <main class="main">
      <!-- Loading skeleton -->
      <div id="loadingState" class="loading-state">
        <div class="skeleton-card" aria-hidden="true">
          <div class="sk sk-title"></div>
          <div class="sk sk-tag"></div>
          <div class="sk sk-line"></div>
          <div class="sk sk-line sk-short"></div>
        </div>
        <div class="skeleton-card" aria-hidden="true">
          <div class="sk sk-title"></div>
          <div class="sk sk-tag"></div>
          <div class="sk sk-line"></div>
          <div class="sk sk-line sk-short"></div>
        </div>
        <div class="skeleton-card" aria-hidden="true">
          <div class="sk sk-title"></div>
          <div class="sk sk-tag"></div>
          <div class="sk sk-line"></div>
          <div class="sk sk-line sk-short"></div>
        </div>
      </div>

      <!-- Error state -->
      <div id="errorState" class="error-state" style="display:none;">
        <div class="error-icon">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        </div>
        <h2>Could not load release notes</h2>
        <p id="errorMsg">Something went wrong while fetching the feed.</p>
        <button class="retry-btn" onclick="loadReleaseNotes()">Try again</button>
      </div>

      <!-- Entries feed -->
      <div id="entriesFeed" class="entries-feed" style="display:none;"></div>
    </main>

    <footer class="footer">
      <span>Data sourced from</span>
      <a href="https://docs.cloud.google.com/bigquery/docs/release-notes" target="_blank" rel="noopener">Google Cloud BigQuery Release Notes</a>
    </footer>
  </div>

  <!-- Tweet Modal -->
  <div id="tweetModal" class="modal-overlay" style="display:none;" onclick="closeTweetModal(event)">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-header">
        <div class="modal-title-row">
          <span class="modal-x-icon">
            <svg width="22" height="22" viewBox="0 0 1200 1227" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M714.163 519.284L1160.89 0H1055.03L667.137 450.887L357.328 0H0L468.492 681.821L0 1226.37H105.866L515.491 750.218L842.672 1226.37H1200L714.163 519.284ZM569.165 687.828L521.697 619.934L144.011 79.6944H306.615L611.412 515.685L658.88 583.579L1055.08 1150.3H892.476L569.165 687.828Z" fill="white"/>
            </svg>
          </span>
          <h2 class="modal-title" id="modalTitle">Share on X (Twitter)</h2>
        </div>
        <button class="modal-close" onclick="closeTweetModal()" aria-label="Close modal">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <p class="modal-hint">Edit your tweet before sharing:</p>
        <div class="tweet-composer">
          <textarea id="tweetText" class="tweet-textarea" rows="5" maxlength="280" oninput="updateCharCount()"></textarea>
          <div class="tweet-footer">
            <span class="char-count"><span id="charCount">0</span>/280</span>
            <a id="tweetLink" href="#" target="_blank" rel="noopener" class="tweet-btn" id="tweetSubmitBtn">
              <span class="x-logo-sm">
                <svg width="15" height="15" viewBox="0 0 1200 1227" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M714.163 519.284L1160.89 0H1055.03L667.137 450.887L357.328 0H0L468.492 681.821L0 1226.37H105.866L515.491 750.218L842.672 1226.37H1200L714.163 519.284ZM569.165 687.828L521.697 619.934L144.011 79.6944H306.615L611.412 515.685L658.88 583.579L1055.08 1150.3H892.476L569.165 687.828Z" fill="white"/>
                </svg>
              </span>
              Post on X
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/static/script.js"></script>
</body>
</html>
